gpu_id: 0
multi_gpus: False
num_workers: 4
mode: 'sgdet'
transformer_mode: 'dsgdetr'

optimizer: 'adamw'
lr: 0.00001
nepoch: 5
enc_layer: 1
dec_layer: 3
bce_loss: True
is_wks: True
feat_dim: 2048
pseudo_way: 0
remove_one_frame_video: False
union_box_feature: True
start_eval_epoch: 0

# GDINO match option
match : 'gdinomatch'
reliability_threshold: 0.1
match_threshold: 0.2
det_path : 'data/action-genome/PLA_gdino_ag_class/'
feat_path : 'data/action-genome/AG_detection_results_ag_class_v2/'
obj_dim : 2048

# Pair Affinity Learning and Scoring
# Balanced BCE only (no margin ranking)
unmatched_sampling : True
pa_weight : 1.0
pa_metric : True
pam_weight : 0.1


# Base directory for saving models (timestamp subdirectory auto-generated)
save_path: 'models/pla/'
model_path: 'models/pla/0214_1616_dsgdetr_gdinomatch_pabalanced_bce_pamtriplet_unmatched/best_model.tar'
data_path: 'data/action-genome/'
datasize: 'large'
ckpt: None
ws_object_bbox_path: 'data/action-genome/annotations/weak/gt_annotation_thres02_keep1.pkl'
