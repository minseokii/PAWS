gpu_id: 1
multi_gpus: False
num_workers: 4
mode: 'sgdet'
transformer_mode: 'wk'

optimizer: 'adamw'
lr: 0.00001
nepoch: 5
enc_layer: 1
dec_layer: 3
bce_loss: True
is_wks: True
feat_dim: 2048
obj_dim: 2048
pseudo_way: 0
union_box_feature: True
loss: 'KL'

# Teacher model: config_7 (bce_emb w=1.0, best separation)
teacher_mode_cfg: 'configs/pla_stage_1/ablation_3.yml'
temperature: 1
alpha: 0.5
transition_module: True
t_lr: 0.001
IOUmatch: True
label_fusion_strategy: 1

# Match option (exact matching for stage 2)
match : 'ori'
det_path : '/SSD1/minseok/WS-DSGG/TRKT/data/action-genome/PLA_det_ag_class/'
feat_path : '/SSD1/minseok/WS-DSGG/TRKT/data/action-genome/PLA_det_ag_class/'


# Pair Affinity Learning and Scoring
# dist_bce_emb: distance-weighted BCE + embedding loss
# alpha = (1 - distance/max_distance)^power
# target = alpha * pseudo_gt + (1 - alpha) * sigmoid(teacher_logit)
unmatched_sampling : True
pam : True
pa_loss : ['balanced_dist_bce']
pam_loss : ['adaptive']
pa_weight : 1.0
pa_alpha_power : 3.0
pam_weight : 0.1
pam_margin : 1.0
propagate_margin : 0.3
pa_metric : True


save_path: 'models/stage2/'
model_path: None
data_path: '/SSD1/minseok/WS-DSGG/TRKT/data/action-genome/'
datasize: 'large'
ckpt: None
ws_object_bbox_path: 'annotations/weak/pla_stage2_base.pkl'
start_eval_epoch: 0

tensorboard_name: 'runs/stage2_dist_bce'
