gpu_id: 0
multi_gpus: False
num_workers: 4
mode: 'sgdet'
transformer_mode: 'wk'

optimizer: 'adamw'
lr: 0.00001
nepoch: 5
enc_layer: 1
dec_layer: 3
bce_loss: True
is_wks: True
feat_dim: 2048
obj_dim: 2048
pseudo_way: 0
union_box_feature: True
loss: 'KL'

# Teacher model
teacher_mode_cfg: 'configs/pla_stage_1/pals_bce.yml'
temperature: 1
alpha: 0.5
transition_module: True
t_lr: 0.001
IOUmatch: True
label_fusion_strategy: 1

# Match option (exact matching for stage 2)
match : 'exact'
det_path : '/SSD1/minseok/WS-DSGG/TRKT/data/action-genome/PLA_det_ag_class/'
feat_path : '/SSD1/minseok/WS-DSGG/TRKT/data/action-genome/PLA_det_ag_class/'

# Pair Affinity Learning and Scoring
# Ablation: dist_bce (unbalanced) instead of balanced_dist_bce
unmatched_sampling : True
pam : True
pa_weight : 1.0
pa_alpha_power : 3.0
pa_metric : True
pam_weight : 0.1
pam_margin : 1.0
propagate_margin : 0.3


save_path: 'models/pla/'
model_path: "models/pla/0310_0043_wk_exact_padist_bce_pamadaptive_unmatched/best_model.tar"
data_path: '/SSD1/minseok/WS-DSGG/TRKT/data/action-genome/'
datasize: 'large'
ckpt: None
ws_object_bbox_path: 'annotations/weak/gt_pla_gdino_modelfree_05_skip2.pkl'
start_eval_epoch: 0
